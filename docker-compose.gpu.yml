version: '3.8'

# ============================================================================
# GPU Override Configuration for Docker Compose
# ============================================================================
# This file provides GPU-enabled overrides for the main docker-compose.yml
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Requirements:
#   - NVIDIA GPU with CUDA 12.4+ support
#   - nvidia-docker2 installed
#   - NVIDIA Container Toolkit configured
#
# Verify GPU access:
#   docker run --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi
# ============================================================================

services:
  # GPU-enabled training service
  training:
    build:
      target: training-gpu
    environment:
      - DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  # GPU-enabled transformer training
  transformer-training:
    build:
      target: training-gpu
    environment:
      - DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  # GPU-enabled evaluation (for large model inference)
  evaluation:
    build:
      target: training-gpu
    environment:
      - DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

  # GPU-enabled portfolio (multi-ticker requires more compute)
  portfolio:
    build:
      target: training-gpu
    environment:
      - DEVICE=cuda
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia

# ============================================================================
# GPU Usage Examples:
# ============================================================================
# Train with GPU:
#   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up training
#
# Full GPU pipeline:
#   docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up
#
# Monitor GPU usage:
#   watch -n 1 nvidia-smi
#
# Multi-GPU setup (modify CUDA_VISIBLE_DEVICES):
#   Set CUDA_VISIBLE_DEVICES=0,1 for multi-GPU training
# ============================================================================
